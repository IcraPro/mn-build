name: Release hotfix

on:
  workflow_dispatch:
    inputs:
      incrementPatch:
        description: 'Increment patch version.'
        required: true
        default: true
        type: boolean

jobs:
  test:
    uses: VirtoCommerce/.github/.github/workflows/test-and-sonar.yml@v3.200.20
    secrets:
      sonarToken: ${{ secrets.SONAR_TOKEN }}

  build:
    uses: VirtoCommerce/.github/.github/workflows/build.yml@v3.200.20
    with:
      uploadPackage: 'true'
      uploadDocker: 'false'
      forceVersionSuffix: 'false'
      incrementPatch: ${{ github.event.inputs.incrementPatch }}
    secrets:
      envPAT: ${{ secrets.REPO_TOKEN }}

  get-metadata:
    runs-on: ubuntu-20.04
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:

    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Get Changelog
      id: changelog
      uses: IcraPro/mn-github-actions/changelog-generator@main

  publish-github-release:
    needs:
      [build, test, get-metadata]
    uses: VirtoCommerce/.github/.github/workflows/publish-github.yml@v3.200.20
    with:
      fullKey: ${{ needs.build.outputs.packageFullKey }}
      changeLog: '${{ needs.get-metadata.outputs.changeLog }}'
      incrementPatch: ${{ github.event.inputs.incrementPatch }}

    secrets:
      envPAT: ${{ secrets.GITHUB_TOKEN }}
      nugetKey: ${{ secrets.NUGET_KEY }}

  increment-version:
    needs:
      [publish-github-release]
    if: ${{ github.event.inputs.incrementPatch == 'true' }}
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Minima.GlobalTool
      uses: IcraPro/mn-github-actions/setup-mnbuild@main

    - name: Setup Git Credentials
      uses: IcraPro/mn-github-actions/setup-git-credentials-github@main
      with:
        githubToken: ${{ secrets.REPO_TOKEN }}

    - name: Increment Version
      run: |
        mn-build IncrementPatch
        git add Directory.Build.props *module.manifest
        git commit -m "ci: Auto IncrementPatch"
        git push

  publish-private-nuget:
    needs:
      [publish-github-release]
    runs-on: ubuntu-20.04
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: ${{ needs.build.outputs.packageFullKey }}
        path: artifacts

    - name: Publish to Private NuGet
      run: |
        dotnet nuget push artifacts/*.nupkg \
          --source https://nuget.alaplihaber.com \
          --api-key ${{ secrets.PRIVATE_NUGET_KEY }} \
          --skip-duplicate
